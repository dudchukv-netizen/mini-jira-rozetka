<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Пункт задач</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
  :root {
    --bg: #EDEEE4;
    --ink: #23281F;
    --card: #FCFBF7;
    --border: #D8D9CC;
    --muted: #6B6B5E;
    --amber: #C98A2E;
    --red: #B4482F;
    --green: #5C7A52;
    --blue: #3B6EA8;
    --purple: #8A5CA8;
    --grey: #6B6B5E;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg);
    color: var(--ink);
  }
  .hidden { display: none !important; }
  .screen { min-height: 100vh; padding: 24px 16px 40px; }

  /* ---------- Role picker ---------- */
  #screen-role { display: flex; align-items: center; justify-content: center; min-height: 100vh; }
  .role-box { max-width: 420px; width: 100%; text-align: center; }
  .eyebrow { font-size: 11px; font-weight: 800; letter-spacing: 0.15em; text-transform: uppercase; color: var(--amber); margin-bottom: 10px; }
  .role-box h1 { font-size: 28px; font-weight: 900; margin: 0 0 8px; line-height: 1.15; }
  .role-box p { font-size: 14px; color: var(--muted); margin: 0 0 28px; }
  .role-btns { display: flex; flex-direction: column; gap: 12px; }
  .btn-role {
    padding: 16px; border-radius: 6px; font-size: 15px; font-weight: 700; cursor: pointer;
  }
  .btn-role.primary { border: 2px solid var(--ink); background: var(--ink); color: var(--card); }
  .btn-role.secondary { border: 2px solid var(--ink); background: transparent; color: var(--ink); }

  .back-link { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; margin-bottom: 16px; padding: 0; }

  /* ---------- Employee form ---------- */
  #screen-employee .wrap { max-width: 480px; margin: 0 auto; }
  #screen-employee h2 { font-size: 20px; font-weight: 800; margin: 0 0 4px; }
  #screen-employee .sub { font-size: 13px; color: var(--muted); margin: 0 0 20px; }
  label.field-label { font-size: 12px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; display: block; margin-top: 16px; }
  input[type="text"], textarea {
    width: 100%; padding: 11px 12px; margin: 6px 0 0; border: 1.5px solid var(--border);
    border-radius: 5px; font-size: 14px; background: var(--card); color: var(--ink); font-family: inherit;
  }
  textarea { resize: vertical; }
  .cat-chips { display: flex; flex-wrap: wrap; gap: 8px; margin: 6px 0 0; }
  .chip {
    font-size: 12.5px; font-weight: 700; padding: 7px 12px; border-radius: 20px;
    border: 1.5px solid var(--border); background: var(--card); color: var(--ink); cursor: pointer;
  }
  .chip.active { color: var(--card); border-width: 2px; }
  .urgent-row { display: flex; align-items: center; gap: 8px; font-size: 13.5px; font-weight: 600; margin: 18px 0 0; cursor: pointer; }
  .btn-submit {
    width: 100%; padding: 14px; border-radius: 6px; border: none; background: var(--ink); color: var(--card);
    font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 20px; display: flex; align-items: center; justify-content: center; gap: 8px;
  }
  .btn-submit:disabled { background: var(--border); cursor: not-allowed; }
  .success-box { margin-top: 14px; padding: 12px 14px; background: var(--green); color: var(--card); border-radius: 5px; font-size: 13.5px; font-weight: 600; text-align: center; }
  .error-box { color: var(--red); font-size: 13px; margin-top: 12px; }

  /* ---------- Manager board ---------- */
  #screen-manager .wrap { max-width: 1000px; margin: 0 auto; }
  .board-header { display: flex; justify-content: space-between; align-items: flex-start; flex-wrap: wrap; gap: 12px; margin-bottom: 18px; }
  .board-header h2 { font-size: 22px; font-weight: 800; margin: 0; }
  .stats-row { display: flex; gap: 10px; margin-bottom: 18px; flex-wrap: wrap; }
  .stat-box { flex: 1 1 120px; background: var(--card); border: 1.5px solid var(--ink); border-radius: 6px; padding: 10px 14px; }
  .stat-label { font-size: 11px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .stat-num { font-size: 24px; font-weight: 900; }
  .filter-row { display: flex; align-items: center; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
  .columns { display: grid; grid-template-columns: repeat(auto-fit, minmax(240px, 1fr)); gap: 20px; }
  .col-title { font-size: 12px; font-weight: 800; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 10px; }
  .empty-note { font-size: 12.5px; color: #A5A692; font-style: italic; padding: 8px 0; }

  .tag-card {
    position: relative; background: var(--card); border: 1.5px solid var(--ink); border-radius: 3px;
    padding: 14px 16px 14px 20px; margin-bottom: 10px;
    clip-path: polygon(0% 0%, 100% 0%, 100% 100%, 10px 100%, 10px calc(50% + 5px), 0% 50%, 10px calc(50% - 5px), 10px 0%);
  }
  .tag-card-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .cat-badge { font-size: 10px; font-weight: 800; letter-spacing: 0.06em; text-transform: uppercase; color: var(--card); padding: 3px 8px; border-radius: 2px; white-space: nowrap; }
  .urgent-flag { display: flex; align-items: center; gap: 4px; color: var(--red); font-size: 11px; font-weight: 700; }
  .tag-text { margin: 10px 0 8px; font-size: 14.5px; line-height: 1.45; color: var(--ink); font-weight: 500; }
  .tag-meta { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: var(--muted); }
  .tag-actions { display: flex; gap: 8px; margin-top: 12px; border-top: 1px dashed var(--border); padding-top: 10px; }
  .btn-cycle { flex: 1; font-size: 12.5px; font-weight: 700; padding: 7px 10px; border-radius: 3px; border: 1.5px solid var(--ink); background: var(--ink); color: var(--card); cursor: pointer; }
  .btn-cycle.done { background: var(--green); }
  .btn-delete { padding: 7px 10px; border-radius: 3px; border: 1.5px solid var(--border); background: transparent; color: var(--muted); cursor: pointer; }
  .btn-refresh { display: flex; align-items: center; gap: 6px; font-size: 12.5px; font-weight: 700; padding: 8px 12px; border-radius: 5px; border: 1.5px solid var(--ink); background: var(--card); cursor: pointer; }
</style>
</head>
<body>

<!-- ROLE SCREEN -->
<div id="screen-role" class="screen">
  <div class="role-box">
    <div class="eyebrow">Пункт задач</div>
    <h1>Задача не губиться,<br>коли їй є де впасти</h1>
    <p>Обери, як ти сьогодні заходиш</p>
    <div class="role-btns">
      <button class="btn-role primary" onclick="showScreen('employee')">Я працівник — поставити задачу</button>
      <button class="btn-role secondary" onclick="showScreen('manager')">Я керівник — переглянути дошку</button>
    </div>
  </div>
</div>

<!-- EMPLOYEE SCREEN -->
<div id="screen-employee" class="screen hidden">
  <div class="wrap">
    <button class="back-link" onclick="showScreen('role')">← назад</button>
    <h2>Нова задача</h2>
    <p class="sub">Заповни коротко — керівник побачить це одразу.</p>

    <label class="field-label">Твоє ім'я</label>
    <input type="text" id="inp-name" placeholder="Наприклад, Олена">

    <label class="field-label">Категорія</label>
    <div class="cat-chips" id="cat-chips"></div>

    <label class="field-label">Опис</label>
    <textarea id="inp-text" rows="4" placeholder="Коротко, у чому суть задачі чи запиту"></textarea>

    <label class="urgent-row">
      <input type="checkbox" id="inp-urgent"> Це термінове
    </label>

    <div id="emp-error" class="error-box hidden"></div>

    <button class="btn-submit" id="btn-submit" onclick="submitTask()">+ Надіслати задачу</button>
    <div id="emp-success" class="success-box hidden">Задачу надіслано ✓</div>
  </div>
</div>

<!-- MANAGER SCREEN -->
<div id="screen-manager" class="screen hidden">
  <div class="wrap">
    <div class="board-header">
      <div>
        <button class="back-link" onclick="showScreen('role')">← назад</button>
        <h2>Дошка задач</h2>
      </div>
      <button class="btn-refresh" onclick="loadTasks()">↻ Оновити</button>
    </div>

    <div class="stats-row" id="stats-row"></div>
    <div class="filter-row" id="filter-row"></div>
    <div id="mgr-error" class="error-box hidden"></div>
    <div class="columns" id="columns"></div>
  </div>
</div>

<script>
// ======= FIREBASE CONFIG =======
const firebaseConfig = {
  apiKey: "AIzaSyB7_3qyLATAfc7Tezas45HtlrgYrP9jiIM",
  authDomain: "mini-jira-rozetka.firebaseapp.com",
  projectId: "mini-jira-rozetka",
  storageBucket: "mini-jira-rozetka.firebasestorage.app",
  messagingSenderId: "610504181492",
  appId: "1:610504181492:web:86a8248dcf6e3c64c0c0a1"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
const tasksRef = db.collection('tasks');

// ======= DATA =======
const CATEGORIES = [
  { id: "photo", label: "Фотозвіт / вітрина", color: "#B4482F" },
  { id: "1c", label: "1С", color: "#3B6EA8" },
  { id: "road", label: "Дорога / доставка", color: "#5C7A52" },
  { id: "grafik", label: "Графік / зарплата", color: "#8A5CA8" },
  { id: "idea", label: "Ідея / пропозиція", color: "#C98A2E" },
  { id: "other", label: "Інше", color: "#6B6B5E" },
];
const STATUSES = [
  { id: "new", label: "Нова" },
  { id: "progress", label: "В роботі" },
  { id: "done", label: "Виконано" },
];

let selectedCategory = CATEGORIES[0].id;
let currentFilter = "all";
let allTasks = [];
let unsubscribe = null;

function catInfo(id) { return CATEGORIES.find(c => c.id === id) || CATEGORIES[CATEGORIES.length - 1]; }

function timeAgo(ts) {
  const diff = Math.floor((Date.now() - ts) / 1000);
  if (diff < 60) return "щойно";
  if (diff < 3600) return Math.floor(diff / 60) + " хв тому";
  if (diff < 86400) return Math.floor(diff / 3600) + " год тому";
  return Math.floor(diff / 86400) + " дн тому";
}

// ======= SCREEN NAV =======
function showScreen(name) {
  document.getElementById('screen-role').classList.add('hidden');
  document.getElementById('screen-employee').classList.add('hidden');
  document.getElementById('screen-manager').classList.add('hidden');
  if (unsubscribe) { unsubscribe(); unsubscribe = null; }

  if (name === 'role') {
    document.getElementById('screen-role').classList.remove('hidden');
  } else if (name === 'employee') {
    document.getElementById('screen-employee').classList.remove('hidden');
    renderCategoryChips();
  } else if (name === 'manager') {
    document.getElementById('screen-manager').classList.remove('hidden');
    renderFilterChips();
    loadTasks();
  }
}

// ======= EMPLOYEE FORM =======
function renderCategoryChips() {
  const box = document.getElementById('cat-chips');
  box.innerHTML = '';
  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (selectedCategory === c.id ? ' active' : '');
    btn.textContent = c.label;
    btn.style.borderColor = selectedCategory === c.id ? c.color : '';
    btn.style.background = selectedCategory === c.id ? c.color : '';
    btn.onclick = () => { selectedCategory = c.id; renderCategoryChips(); };
    box.appendChild(btn);
  });
}

async function submitTask() {
  const name = document.getElementById('inp-name').value.trim();
  const text = document.getElementById('inp-text').value.trim();
  const urgent = document.getElementById('inp-urgent').checked;
  const errBox = document.getElementById('emp-error');
  const btn = document.getElementById('btn-submit');
  errBox.classList.add('hidden');

  if (!name || !text) {
    errBox.textContent = "Заповни ім'я і опис задачі.";
    errBox.classList.remove('hidden');
    return;
  }

  btn.disabled = true;
  btn.textContent = "Надсилаю...";

  try {
    await tasksRef.add({
      author: name,
      category: selectedCategory,
      priority: urgent ? "urgent" : "normal",
      text: text,
      status: "new",
      createdAt: Date.now()
    });
    document.getElementById('inp-text').value = '';
    document.getElementById('inp-urgent').checked = false;
    document.getElementById('emp-success').classList.remove('hidden');
    setTimeout(() => document.getElementById('emp-success').classList.add('hidden'), 2500);
  } catch (e) {
    errBox.textContent = "Не вдалося надіслати. Перевір інтернет і спробуй ще раз.";
    errBox.classList.remove('hidden');
  } finally {
    btn.disabled = false;
    btn.textContent = "+ Надіслати задачу";
  }
}

// ======= MANAGER BOARD =======
function renderFilterChips() {
  const box = document.getElementById('filter-row');
  box.innerHTML = '<span style="font-size:14px;color:var(--muted);">Фільтр:</span>';
  const allBtn = document.createElement('button');
  allBtn.className = 'chip' + (currentFilter === 'all' ? ' active' : '');
  allBtn.textContent = 'Усі';
  allBtn.style.background = currentFilter === 'all' ? '#23281F' : '';
  allBtn.style.color = currentFilter === 'all' ? '#FCFBF7' : '';
  allBtn.onclick = () => { currentFilter = 'all'; renderFilterChips(); renderBoard(); };
  box.appendChild(allBtn);

  CATEGORIES.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'chip' + (currentFilter === c.id ? ' active' : '');
    btn.textContent = c.label;
    btn.style.borderColor = currentFilter === c.id ? c.color : '';
    btn.style.background = currentFilter === c.id ? c.color : '';
    btn.onclick = () => { currentFilter = c.id; renderFilterChips(); renderBoard(); };
    box.appendChild(btn);
  });
}

function loadTasks() {
  const errBox = document.getElementById('mgr-error');
  errBox.classList.add('hidden');
  if (unsubscribe) unsubscribe();
  unsubscribe = tasksRef.orderBy('createdAt', 'desc').onSnapshot(
    snapshot => {
      allTasks = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      renderBoard();
    },
    err => {
      errBox.textContent = "Не вдалося завантажити задачі: " + err.message;
      errBox.classList.remove('hidden');
    }
  );
}

async function cycleStatus(id) {
  const task = allTasks.find(t => t.id === id);
  if (!task) return;
  const idx = STATUSES.findIndex(s => s.id === task.status);
  const next = STATUSES[Math.min(idx + 1, STATUSES.length - 1)].id;
  try {
    await tasksRef.doc(id).update({ status: next });
  } catch (e) {
    document.getElementById('mgr-error').textContent = "Не вдалося оновити статус.";
    document.getElementById('mgr-error').classList.remove('hidden');
  }
}

async function deleteTask(id) {
  try {
    await tasksRef.doc(id).delete();
  } catch (e) {
    document.getElementById('mgr-error').textContent = "Не вдалося видалити задачу.";
    document.getElementById('mgr-error').classList.remove('hidden');
  }
}

function renderBoard() {
  const visible = currentFilter === 'all' ? allTasks : allTasks.filter(t => t.category === currentFilter);

  const counts = { new: 0, progress: 0, done: 0 };
  allTasks.forEach(t => { if (counts[t.status] !== undefined) counts[t.status]++; });

  const statsBox = document.getElementById('stats-row');
  statsBox.innerHTML = '';
  STATUSES.forEach(s => {
    const div = document.createElement('div');
    div.className = 'stat-box';
    div.innerHTML = '<div class="stat-label">' + s.label + '</div><div class="stat-num">' + counts[s.id] + '</div>';
    statsBox.appendChild(div);
  });

  const columns = document.getElementById('columns');
  columns.innerHTML = '';
  STATUSES.forEach(s => {
    const colTasks = visible.filter(t => t.status === s.id).sort((a, b) => b.createdAt - a.createdAt);
    const col = document.createElement('div');
    const title = document.createElement('div');
    title.className = 'col-title';
    title.textContent = s.label + ' (' + colTasks.length + ')';
    col.appendChild(title);

    if (colTasks.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-note';
      empty.textContent = 'Порожньо';
      col.appendChild(empty);
    }

    colTasks.forEach(t => col.appendChild(renderCard(t)));
    columns.appendChild(col);
  });
}

function renderCard(task) {
  const cat = catInfo(task.category);
  const statusIdx = STATUSES.findIndex(s => s.id === task.status);
  const card = document.createElement('div');
  card.className = 'tag-card';

  const top = document.createElement('div');
  top.className = 'tag-card-top';
  const badge = document.createElement('span');
  badge.className = 'cat-badge';
  badge.textContent = cat.label;
  badge.style.background = cat.color;
  top.appendChild(badge);
  if (task.priority === 'urgent') {
    const flag = document.createElement('span');
    flag.className = 'urgent-flag';
    flag.textContent = '⚠ ТЕРМІНОВО';
    top.appendChild(flag);
  }
  card.appendChild(top);

  const text = document.createElement('p');
  text.className = 'tag-text';
  text.textContent = task.text;
  card.appendChild(text);

  const meta = document.createElement('div');
  meta.className = 'tag-meta';
  meta.innerHTML = '<span>👤 ' + task.author + '</span><span>🕐 ' + timeAgo(task.createdAt) + '</span>';
  card.appendChild(meta);

  const actions = document.createElement('div');
  actions.className = 'tag-actions';
  const cycleBtn = document.createElement('button');
  cycleBtn.className = 'btn-cycle' + (statusIdx === 2 ? ' done' : '');
  cycleBtn.textContent = statusIdx === 0 ? 'Взяти в роботу' : (statusIdx === 1 ? 'Позначити виконаним' : 'Виконано');
  cycleBtn.onclick = () => cycleStatus(task.id);
  actions.appendChild(cycleBtn);

  const delBtn = document.createElement('button');
  delBtn.className = 'btn-delete';
  delBtn.textContent = '✕';
  delBtn.title = 'Видалити';
  delBtn.onclick = () => deleteTask(task.id);
  actions.appendChild(delBtn);

  card.appendChild(actions);
  return card;
}
</script>
</body>
</html>
